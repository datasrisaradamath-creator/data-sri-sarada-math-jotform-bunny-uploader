<div id="widget-wrap">
    <div id="student-list">
        </div>
    <button type="button" class="btn-add" onclick="addNewStudent()">+ Add Student</button>
</div>

<div style="display:none;">
    <div class="student-block" id="MASTER_TEMPLATE">
        <div class="student-count-badge">Student</div>
        <div class="name-row">
            <div><label>First Name<span>*</span></label><input type="text" class="fName" oninput="sync()"></div>
            <div><label>Middle Name</label><input type="text" class="mName" oninput="sync()"></div>
            <div><label>Surname</label><input type="text" class="sName" oninput="sync()"></div>
        </div>
        <div class="meta-row">
            <div><label>Gender<span>*</span></label>
                <select class="gender" onchange="sync()">
                    <option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option>
                </select>
            </div>
            <div><label>Standard<span>*</span></label>
                <select class="std" onchange="sync()">
                    <option value="">Select</option><option value="5">5</option><option value="6">6</option><option value="7">7</option>
                </select>
            </div>
            <div><label>Division</label><input type="text" class="div" oninput="sync()"></div>
            <div class="del-col"></div>
        </div>
        <div class="upload-area">
            </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://bunny-uploader.datasrisaradamath.workers.dev";
    const TRASH_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
    
    let videoData = {}; 

    const resizeObserver = new ResizeObserver(() => {
        const height = document.body.offsetHeight + 40; 
        JFCustomWidget.requestFrameResize({ width: '100%', height: height });
    });
    resizeObserver.observe(document.body);

    function refreshIndices() {
        const rows = document.querySelectorAll('#student-list .student-block');
        rows.forEach((row, index) => {
            row.querySelector('.student-count-badge').innerText = `Student ${index + 1}`;
            const delCol = row.querySelector('.del-col');
            // Allow deletion if more than 1 row exists
            delCol.innerHTML = (rows.length > 1) 
                ? `<button type="button" class="ref-delete-btn" onclick="removeRow('${row.id}')">${TRASH_ICON} Delete Student</button>`
                : '';
        });
    }

    function addNewStudent(savedData = null) {
        const list = document.getElementById('student-list');
        const uid = savedData?.uid || "u" + Date.now() + Math.floor(Math.random() * 1000);
        
        // Clone from the HIDDEN master template
        const block = document.getElementById('MASTER_TEMPLATE').cloneNode(true);
        block.id = uid;
        
        // Fill data if persisting
        if (savedData) {
            block.querySelector('.fName').value = savedData.firstName || "";
            block.querySelector('.mName').value = savedData.middleName || "";
            block.querySelector('.sName').value = savedData.surname || "";
            block.querySelector('.gender').value = savedData.gender || "";
            block.querySelector('.std').value = savedData.standard || "";
            block.querySelector('.div').value = savedData.division || "";
            if (savedData.videoId) videoData[uid] = { videoId: savedData.videoId };
        }

        // Setup Upload Area
        const area = block.querySelector('.upload-area');
        area.id = "up-" + uid;
        if (videoData[uid]?.videoId) {
            area.innerHTML = `<div class="uploaded-badge">✓ Video Uploaded</div>`;
        } else {
            area.innerHTML = `<label>Upload Video<span>*</span></label><input type="file" accept="video/*" onchange="handleUpload('${uid}', this.files[0])">`;
        }
        
        list.appendChild(block);
        refreshIndices();
        if (!savedData) sync(); // Only sync automatically for new blank rows
    }

    async function removeRow(uid) {
        const vId = videoData[uid]?.videoId;
        if (vId) {
            fetch(`${WORKER_URL}/delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ videoId: vId })
            }).catch(() => {});
        }
        const el = document.getElementById(uid);
        if (el) el.remove();
        delete videoData[uid];
        refreshIndices();
        sync();
    }

    async function handleUpload(uid, file) {
        const row = document.getElementById(uid);
        const area = document.getElementById("up-" + uid);
        const fName = row.querySelector('.fName').value;
        const sName = row.querySelector('.sName').value;
        const stdVal = row.querySelector('.std').value;
        
        if (!file || !fName || !stdVal) { 
            alert("Please enter First Name and Standard before uploading."); 
            area.querySelector('input').value = ""; // Reset file input
            return; 
        }

        const clean = (s) => s ? s.toString().toLowerCase().trim().replace(/[^a-z0-9]/gi, '_').replace(/_+/g, '_') : "";
        const videoTitle = `story_telling_${clean(fName)}_${clean(sName) || "no_surname"}_std_${stdVal}`;
        
        area.innerHTML = `Uploading... <span id="p-${uid}">0%</span>`;

        try {
            const res = await fetch(`${WORKER_URL}/sign`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: videoTitle }) 
            });
            const creds = await res.json();
            
            new tus.Upload(file, {
                endpoint: "https://video.bunnycdn.com/tusupload",
                headers: { 
                    AuthorizationSignature: creds.signature, 
                    AuthorizationExpire: creds.expirationTime, 
                    VideoId: creds.videoId, 
                    LibraryId: creds.libraryId 
                },
                onProgress: (s, t) => { 
                    const pct = Math.round((s/t)*100);
                    const p = document.getElementById(`p-${uid}`);
                    if (p) p.innerText = pct + "%"; 
                },
                onSuccess: () => {
                    area.innerHTML = `<div class="uploaded-badge">✓ Video Uploaded</div>`;
                    videoData[uid] = { videoId: creds.videoId };
                    sync();
                },
                onError: (err) => {
                    alert("Upload failed: " + err);
                    area.innerHTML = `<label>Upload Video<span>*</span></label><input type="file" accept="video/*" onchange="handleUpload('${uid}', this.files[0])">`;
                }
            }).start();
        } catch (e) { 
            alert("Connection error."); 
            area.innerHTML = `<label>Upload Video<span>*</span></label><input type="file" accept="video/*" onchange="handleUpload('${uid}', this.files[0])">`;
        }
    }

    function sync() {
        const out = [];
        let allValid = true;
        document.querySelectorAll('#student-list .student-block').forEach((row) => {
            const fName = row.querySelector('.fName').value;
            const gender = row.querySelector('.gender').value;
            const std = row.querySelector('.std').value;
            const vId = videoData[row.id]?.videoId;
            
            if (!fName || !gender || !std || !vId) allValid = false;
            
            out.push({ 
                uid: row.id,
                firstName: fName, 
                middleName: row.querySelector('.mName').value,
                surname: row.querySelector('.sName').value,
                gender: gender,
                standard: std, 
                division: row.querySelector('.div').value,
                videoId: vId || null 
            });
        });
        const val = (allValid && out.length > 0) ? JSON.stringify(out) : "";
        JFCustomWidget.sendData({ value: val });
    }

    // MAIN INITIALIZATION
    JFCustomWidget.subscribe("ready", (data) => {
        const list = document.getElementById('student-list');
        list.innerHTML = ''; // Start clean

        if (data && data.value) {
            try {
                const saved = JSON.parse(data.value);
                if (Array.isArray(saved) && saved.length > 0) {
                    saved.forEach(s => addNewStudent(s));
                } else {
                    addNewStudent(); // Default row
                }
            } catch (e) {
                addNewStudent(); // Default row on error
            }
        } else {
            addNewStudent(); // Default row if no data
        }
        refreshIndices();
    });
</script>
