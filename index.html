<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition Registrations 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/tus-js-client@latest/dist/tus.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .name-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        #uploadBtn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #uploadBtn:disabled { background: #ccc; }
        #progressContainer { margin-top: 20px; display: none; }
        progress { width: 100%; height: 20px; accent-color: var(--primary); }
        #statusText { text-align: center; margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registrations 2026</h2>
    
    <div class="form-group">
        <label>Student Full Name</label>
        <div class="name-grid">
            <input type="text" id="fName" placeholder="First">
            <input type="text" id="mName" placeholder="Middle">
            <input type="text" id="sName" placeholder="Surname">
        </div>
    </div>

    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <label>Standard</label>
            <select id="std">
                <option value="">Select</option>
                <option value="1">Class 1</option><option value="2">Class 2</option>
                <option value="3">Class 3</option><option value="4">Class 4</option>
            </select>
        </div>
        <div>
            <label>Division</label>
            <input type="text" id="div" placeholder="e.g. A">
        </div>
    </div>

    <div class="form-group">
        <label>Video (Up to 3GB - MP4/MOV)</label>
        <input type="file" id="videoFile" accept="video/*">
    </div>

    <button id="uploadBtn" onclick="startSecureUpload()">Submit Entry</button>

    <div id="progressContainer">
        <progress id="progBar" value="0" max="100"></progress>
        <div id="statusText">Initializing...</div>
    </div>
</div>

<script>
    // --- SET THESE ---
    const WORKER_URL = "https://bunny-uploader.datasrisaradamath.workers.dev";

    async function startSecureUpload() {
        const file = document.getElementById('videoFile').files[0];
        const firstName = document.getElementById('fName').value;
        const surname = document.getElementById('sName').value;

        if (!file || !firstName || !surname) return alert("Please complete the form!");

        const btn = document.getElementById('uploadBtn');
        const statusText = document.getElementById('statusText');
        btn.disabled = true;
        document.getElementById('progressContainer').style.display = 'block';

        try {
            // 1. Get TUS Signature from Worker
            statusText.innerText = "Securing connection...";
            const authReq = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: `${surname}_${firstName}_2026` })
            });
            const creds = await authReq.json();

            // 2. Start TUS Resumable Upload
            const upload = new tus.Upload(file, {
                endpoint: "https://video.bunnycdn.com/tusupload",
                retryDelays: [0, 3000, 5000, 10000, 20000],
                headers: {
                    AuthorizationSignature: creds.signature,
                    AuthorizationExpire: creds.expirationTime,
                    VideoId: creds.videoId,
                    LibraryId: creds.libraryId,
                },
                metadata: { filename: file.name, filetype: file.type },
                onError: (err) => {
                    statusText.innerText = "Error: " + err;
                    btn.disabled = false;
                },
                onProgress: (bytesSent, bytesTotal) => {
                    const pct = ((bytesSent / bytesTotal) * 100).toFixed(1);
                    document.getElementById('progBar').value = pct;
                    statusText.innerText = `Uploading: ${pct}% (Resumable)`;
                },
                onSuccess: () => {
                    statusText.innerHTML = "<b style='color:green'>✅ Upload Complete!</b>";
                    
                    // 3. Notify Jotform
                    window.parent.postMessage({
                        action: 'set_value',
                        value: creds.videoId,
                        fields: { 'videoId': creds.videoId, 'studentName': firstName + " " + surname }
                    }, "*");
                }
            });

            upload.start();

        } catch (e) {
            statusText.innerText = "Fatal Error: " + e.message;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
