<!DOCTYPE html>
<html>
<head>
    <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tus-js-client@latest/dist/tus.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #ffffff; margin: 0; padding: 10px; color: #2c3e50; }
        .student-row { border-bottom: 1px solid #f0f0f0; padding: 20px 0; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr) 120px 100px 100px 40px; gap: 10px; align-items: end; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #555; }
        label span { color: red; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: #b0bac9; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .delete-bin { cursor: pointer; color: #e74c3c; font-size: 20px; background: none; border: none; padding-bottom: 10px; }
        .upload-area { margin-top: 15px; padding: 10px; border: 1px dashed #3498db; border-radius: 5px; text-align: center; background: #f9f9f9; }
        progress { width: 100%; height: 10px; accent-color: #3498db; }
    </style>
</head>
<body>
    <div id="student-container"></div>
    <button type="button" class="btn-add" id="addStudent">+ Add Student</button>

<script>
    const WORKER_URL = "https://your-worker.workers.dev";
    const SCHOOL_NAME = "My School"; // Hardcoded or pulled from elsewhere
    let students = [];

    JFCustomWidget.subscribe("ready", () => { if(students.length === 0) addRow(); });

    function addRow() {
        students.push({ fName: '', mName: '', sName: '', gender: '', std: '', div: '', videoId: null, status: 'pending' });
        render();
    }

    function render() {
        const container = document.getElementById('student-container');
        container.innerHTML = '';
        students.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'student-row';
            row.innerHTML = `
                <div class="grid">
                    <div><label>First Name<span>*</span></label><input type="text" onchange="update(${i},'fName',this.value)" value="${s.fName}"></div>
                    <div><label>Middle Name</label><input type="text" onchange="update(${i},'mName',this.value)" value="${s.mName}"></div>
                    <div><label>Surname</label><input type="text" onchange="update(${i},'sName',this.value)" value="${s.sName}"></div>
                    <div><label>Gender<span>*</span></label>
                        <select onchange="update(${i},'gender',this.value)"><option>Please Select</option><option value="Boy" ${s.gender==='Boy'?'selected':''}>Boy</option><option value="Girl" ${s.gender==='Girl'?'selected':''}>Girl</option></select>
                    </div>
                    <div><label>Standard<span>*</span></label>
                        <select onchange="update(${i},'std',this.value)"><option>Please</option><option value="5" ${s.std==='5'?'selected':''}>5</option><option value="6" ${s.std==='6'?'selected':''}>6</option><option value="7" ${s.std==='7'?'selected':''}>7</option></select>
                    </div>
                    <div><label>Division</label><input type="text" onchange="update(${i},'div',this.value)" value="${s.div}"></div>
                    <button class="delete-bin" onclick="removeRow(${i})">🗑️</button>
                </div>
                <div class="upload-area">
                    ${s.videoId ? `<b style="color:green">✅ Video Uploaded</b>` : `
                        <label>Upload Video (Compulsory)<span>*</span></label>
                        <input type="file" accept="video/*" onchange="uploadVideo(${i}, this.files[0])">
                        <div id="prog-box-${i}" style="display:none"><progress id="bar-${i}" value="0" max="100"></progress><small id="txt-${i}"></small></div>
                    `}
                </div>
            `;
            container.appendChild(row);
        });
        sync();
    }

    async function uploadVideo(i, file) {
        if(!students[i].fName || !students[i].std) return alert("Please fill Name and Standard first!");
        
        const progBox = document.getElementById(`prog-box-${i}`);
        const bar = document.getElementById(`bar-${i}`);
        progBox.style.display = 'block';

        const fileName = `${students[i].fName}_${students[i].std}_${students[i].div}_${SCHOOL_NAME}`.replace(/\s+/g, '_');

        const res = await fetch(WORKER_URL + "/sign", {
            method: 'POST',
            body: JSON.stringify({ title: fileName })
        });
        const creds = await res.json();

        const upload = new tus.Upload(file, {
            endpoint: "https://video.bunnycdn.com/tusupload",
            headers: { AuthorizationSignature: creds.signature, AuthorizationExpire: creds.expirationTime, VideoId: creds.videoId, LibraryId: creds.libraryId },
            onProgress: (sent, total) => { bar.value = Math.round((sent/total)*100); },
            onSuccess: () => { students[i].videoId = creds.videoId; render(); }
        });
        upload.start();
    }

    function removeRow(i) {
        if(students[i].videoId) fetch(`${WORKER_URL}/delete?id=${students[i].videoId}`, {method:'POST'});
        students.splice(i, 1);
        render();
    }

    function update(i, key, val) { students[i][key] = val; sync(); }
    
    function sync() {
        const valid = students.filter(s => s.fName && s.gender && s.std && s.videoId);
        JFCustomWidget.sendData({ value: JSON.stringify(valid) });
    }

    document.getElementById('addStudent').onclick = addRow;
</script>
</body>
</html>
