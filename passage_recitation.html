<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tus-js-client@latest/dist/tus.min.js"></script>
    <style>
        /* Jotform CSS Reset: Minimizes default widget padding */
        html, body { margin: 0; padding: 0; background: transparent; }
        body { font-family: -apple-system, sans-serif; padding: 5px 15px 10px 5px; }
        
        #widget-wrap { display: flex; flex-direction: column; gap: 20px; width: 100%; }

        #student-list { display: flex; flex-direction: column; gap: 25px; }

        /* Clear Marker & Spacing for Entries */
        .student-block { 
            position: relative;
            padding: 25px 20px; 
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Smart Student Count Badge */
        .student-count-badge {
            position: absolute;
            top: -12px;
            left: 20px;
            background: #4a5568;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .name-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px; 
        }

        .meta-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr 120px auto; 
            gap: 15px; 
            align-items: end;
        }

        @media screen and (max-width: 650px) {
            .name-row, .meta-row { grid-template-columns: 1fr; }
            .ref-delete-btn { width: 100%; justify-content: center; }
        }

        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #333; }
        label span { color: #d73a49; } 
        
        input, select { 
            width: 100%; padding: 10px; border: 1px solid #ccd0d5; border-radius: 6px; 
            font-size: 14px; background: #fafbfc; height: 40px; box-sizing: border-box;
        }

        /* Delete Button with Text */
        .ref-delete-btn { 
            background: #f7fafc; color: #e53e3e; border: 1px solid #feb2b2; 
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; 
            gap: 6px; height: 40px; padding: 0 12px; font-size: 13px; font-weight: 600;
            transition: all 0.2s;
        }
        .ref-delete-btn:hover { background: #fff5f5; border-color: #fc8181; }
        .ref-delete-btn svg { stroke: #e53e3e; }

        .upload-area { 
            padding: 15px; border: 2px dashed #3498db; border-radius: 8px; background: #f1f7fd; 
        }

        .btn-add { 
            background: #4a5568; color: white; border: none;
            padding: 14px 28px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 14px; width: fit-content;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-add:hover { background: #2d3748; }

        .uploaded-badge { 
            display: inline-flex; align-items: center; background: #e6f4ea; 
            color: #1e7e34; padding: 8px 16px; border-radius: 6px; font-weight: bold; 
        }
    </style>
</head>
<body>

<div id="widget-wrap">
    <div id="student-list">
        </div>
    <button type="button" class="btn-add" onclick="addNewStudent()">+ Add Student</button>
</div>

<script>
    const WORKER_URL = "https://your-worker.workers.dev"; 
    const TRASH_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
    
    let videoData = {}; // Stores video IDs by block unique ID

    function updateFrameHeight() {
        setTimeout(() => {
            const height = document.body.scrollHeight + 30;
            JFCustomWidget.requestFrameResize({ width: '100%', height: height });
        }, 50);
    }

    function refreshIndices() {
        const rows = document.querySelectorAll('.student-block');
        rows.forEach((row, index) => {
            // Update the Visual Counter (Student 1, Student 2...)
            row.querySelector('.student-count-badge').innerText = `Student ${index + 1}`;
            
            // Toggle Delete button visibility
            const delCol = row.querySelector('.del-col');
            if (rows.length > 1) {
                delCol.innerHTML = `<button type="button" class="ref-delete-btn" onclick="removeRow('${row.id}')">${TRASH_ICON} Delete Student</button>`;
            } else {
                delCol.innerHTML = '';
            }
        });
        updateFrameHeight();
    }

    function addNewStudent() {
        const list = document.getElementById('student-list');
        const uid = "u" + Date.now(); // Unique internal ID
        
        const block = document.createElement('div');
        block.className = 'student-block';
        block.id = uid;
        block.innerHTML = `
            <div class="student-count-badge">Student</div>
            <div class="name-row">
                <div><label>First Name<span>*</span></label><input type="text" class="fName" oninput="sync()"></div>
                <div><label>Middle Name</label><input type="text" class="mName" oninput="sync()"></div>
                <div><label>Surname</label><input type="text" class="sName" oninput="sync()"></div>
            </div>
            <div class="meta-row">
                <div><label>Gender<span>*</span></label>
                    <select class="gender" onchange="sync()">
                        <option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option>
                    </select>
                </div>
                <div><label>Standard<span>*</span></label>
                    <select class="std" onchange="sync()">
                        <option value="">Select</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
                    </select>
                </div>
                <div><label>Division</label><input type="text" class="div" oninput="sync()"></div>
                <div class="del-col"></div>
            </div>
            <div class="upload-area" id="up-${uid}">
                <label>Upload Video<span>*</span></label>
                <input type="file" accept="video/*" onchange="handleUpload('${uid}', this.files[0])">
            </div>
        `;
        
        list.appendChild(block);
        refreshIndices();
        sync();
    }

    function removeRow(uid) {
        const row = document.getElementById(uid);
        if (row) {
            row.remove();
            delete videoData[uid];
            refreshIndices();
            sync();
        }
    }

    async function handleUpload(uid, file) {
        const row = document.getElementById(uid);
        const fName = row.querySelector('.fName').value;
        const stdVal = row.querySelector('.std').value;
        if (!file || !fName || !stdVal) { alert("Enter Name and Standard first."); return; }
        
        const area = document.getElementById(`up-${uid}`);
        area.innerHTML = `<div style="font-size:14px;">Uploading <b>${file.name}</b>... <span id="p-${uid}">0%</span></div>`;

        try {
            const res = await fetch(`${WORKER_URL}/sign`, {
                method: 'POST',
                body: JSON.stringify({ title: `${fName}_Std${stdVal}_Passage` })
            });
            const creds = await res.json();
            const upload = new tus.Upload(file, {
                endpoint: "https://video.bunnycdn.com/tusupload",
                headers: { AuthorizationSignature: creds.signature, AuthorizationExpire: creds.expirationTime, VideoId: creds.videoId, LibraryId: creds.libraryId },
                onProgress: (s, t) => { document.getElementById(`p-${uid}`).innerText = Math.round((s/t)*100) + "%"; },
                onSuccess: () => {
                    area.innerHTML = `<div class="uploaded-badge">✓ Video Uploaded</div>`;
                    videoData[uid] = { videoId: creds.videoId };
                    sync();
                }
            });
            upload.start();
        } catch (e) { alert("Upload error."); }
    }

    function sync() {
        const out = [];
        document.querySelectorAll('.student-block').forEach((row) => {
            const vId = videoData[row.id]?.videoId;
            if (vId) {
                out.push({
                    firstName: row.querySelector('.fName').value,
                    standard: row.querySelector('.std').value,
                    videoId: vId
                });
            }
        });
        JFCustomWidget.sendData({ value: JSON.stringify(out) });
    }

    JFCustomWidget.subscribe("ready", () => {
        addNewStudent(); // Load one student by default
    });
</script>
</body>
</html>
