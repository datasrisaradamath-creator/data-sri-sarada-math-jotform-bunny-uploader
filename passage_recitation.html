<!DOCTYPE html>
<html>
<head>
    <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tus-js-client@latest/dist/tus.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 10px; }
        
        /* SMOOTH SCROLLING PARAMETERS */
        #widget-container { 
            overflow-x: auto; 
            width: 100%; 
            border: 1px solid #e1e4e8; 
            border-radius: 8px; 
            padding-bottom: 20px;
            /* Physics-based smooth scrolling */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
            /* Optional: Snap to rows when scrolling */
            scroll-snap-type: x proximity; 
        }
        
        #student-list { 
            min-width: 950px; /* Locked width to prevent rendering bugs */
            padding: 10px;
        }

        .student-row { 
            display: grid; 
            /* Fixed column widths to prevent the "buggy" look from your image */
            grid-template-columns: 180px 180px 180px 120px 120px 100px 50px; 
            gap: 15px; 
            align-items: end; 
            padding: 20px 0; 
            border-bottom: 2px solid #f6f8fa;
            scroll-snap-align: start;
        }

        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #333; white-space: nowrap; }
        label span { color: #d73a49; } 
        
        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccd0d5; 
            border-radius: 6px; 
            font-size: 14px; 
            background: #fafbfc;
            height: 40px;
            box-sizing: border-box;
        }

        /* Trash/Delete Button matching your reference exactly */
        .ref-delete-btn { 
            background: #b0bac9; 
            color: #ffffff; 
            border: 1px solid #a0abbc; 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 40px; 
            width: 44px;
            transition: background 0.2s;
        }
        .ref-delete-btn:hover { background: #9da7b8; }

        .upload-area { 
            grid-column: 1 / 5; 
            margin-top: 15px; 
            padding: 15px; 
            border: 2px dashed #3498db; 
            border-radius: 6px; 
            background: #f1f7fd; 
        }

        /* Grey-Blue Add Student Button from your image */
        .btn-add { 
            background: #b0bac9; 
            color: white; 
            border: 1px solid #a0abbc;
            padding: 10px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add:hover { background: #9da7b8; }
        
        .uploaded-badge { 
            display: inline-flex; 
            align-items: center; 
            background: #e6f4ea; 
            color: #1e7e34; 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 1px solid #c3e6cb; 
            font-weight: bold; 
            font-size: 13px; 
        }
    </style>
</head>
<body>

<div id="widget-container">
    <div id="student-list">
        <div class="student-row" id="row-0">
            <div><label>First Name<span>*</span></label><input type="text" class="fName" placeholder="Enter first name" oninput="sync()"></div>
            <div><label>Middle Name</label><input type="text" class="mName" oninput="sync()"></div>
            <div><label>Surname</label><input type="text" class="sName" oninput="sync()"></div>
            <div><label>Gender<span>*</span></label>
                <select class="gender" onchange="sync()">
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div><label>Standard<span>*</span></label>
                <select class="std" onchange="sync()">
                    <option value="">Select</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>
            <div><label>Division</label><input type="text" class="div" oninput="sync()"></div>
            <div></div>
            
            <div class="upload-area" id="upload-sec-0">
                <label>Upload Video<span>*</span></label>
                <input type="file" accept="video/*" onchange="handleUpload(0, this.files[0])">
            </div>
        </div>
    </div>
</div>

<button type="button" class="btn-add" onclick="addNewStudent()">+ Add Student</button>

<script>
    const WORKER_URL = "https://your-worker.workers.dev"; // UPDATE THIS
    const TRASH_ICON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
    let videoData = [{}];

    function addNewStudent() {
        const list = document.getElementById('student-list');
        const index = list.children.length;
        const newRow = list.children[0].cloneNode(true);
        newRow.id = `row-${index}`;
        newRow.querySelectorAll('input').forEach(i => i.value = '');
        newRow.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        const cols = newRow.querySelectorAll('div');
        cols[6].innerHTML = `<button type="button" class="ref-delete-btn" onclick="removeRow(${index})">${TRASH_ICON}</button>`;
        const uploadArea = newRow.querySelector('.upload-area');
        uploadArea.id = `upload-sec-${index}`;
        uploadArea.innerHTML = `<label>Upload Video<span>*</span></label><input type="file" accept="video/*" onchange="handleUpload(${index}, this.files[0])">`;
        list.appendChild(newRow);
        videoData.push({});
        sync();
    }

    function removeRow(i) {
        document.getElementById(`row-${i}`).remove();
        sync();
    }

    async function handleUpload(index, file) {
        const row = document.getElementById(`row-${index}`);
        const fName = row.querySelector('.fName').value;
        const stdVal = row.querySelector('.std').value;
        if (!file || !fName || !stdVal) { alert("Please enter First Name and Standard."); return; }

        const area = document.getElementById(`upload-sec-${index}`);
        area.innerHTML = `<div style="font-size:13px;">Uploading: ${file.name}... <strong id="p-${index}">0%</strong></div>`;

        try {
            const res = await fetch(`${WORKER_URL}/sign`, {
                method: 'POST',
                body: JSON.stringify({ title: `${fName}_Standard${stdVal}_Passage` })
            });
            const creds = await res.json();
            const upload = new tus.Upload(file, {
                endpoint: "https://video.bunnycdn.com/tusupload",
                headers: { AuthorizationSignature: creds.signature, AuthorizationExpire: creds.expirationTime, VideoId: creds.videoId, LibraryId: creds.libraryId },
                onProgress: (s, t) => { document.getElementById(`p-${index}`).innerText = Math.round((s/t)*100) + "%"; },
                onSuccess: () => {
                    area.innerHTML = `<div class="uploaded-badge">✓ Video Uploaded</div>`;
                    videoData[index] = { videoId: creds.videoId };
                    sync();
                }
            });
            upload.start();
        } catch (e) { alert("Upload failed."); }
    }

    function sync() {
        const out = [];
        document.querySelectorAll('.student-row').forEach((row, i) => {
            if (videoData[i]?.videoId) {
                out.push({
                    name: row.querySelector('.fName').value,
                    standard: row.querySelector('.std').value,
                    videoId: videoData[i].videoId
                });
            }
        });
        JFCustomWidget.sendData({ value: JSON.stringify(out) });
    }
    JFCustomWidget.subscribe("ready", sync);
</script>
</body>
</html>
